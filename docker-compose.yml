services:
  postgres:
    image: postgres:15-alpine
    container_name: agent_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agent_network

volumes:
  postgres_data:

networks:
  agent_network:
    driver: bridge